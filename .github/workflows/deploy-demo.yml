name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "example/**"
      - "lib/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid stepping on a previous deploy that's still in flight.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve example dependencies
        run: flutter pub get

      - name: Build Flutter web (release)
        # base-href must match the repo path so asset URLs resolve when the
        # site is served from https://hariantara.github.io/ops_calendar/
        run: flutter build web --release --base-href /ops_calendar/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
