version: 0.1.3
homepage: https://github.com/hariantara/ops_calendar
repository: https://github.com/hariantara/ops_calendar
issue_tracker: https://github.com/hariantara/ops_calendar/issues
topics:
  - calendar
  - widget
  - event
  - appointment
  - month-view

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  meta: ^1.17.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  very_good_analysis: ^6.0.0

